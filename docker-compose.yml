version: "3.9"

services:
  # ── DNS Server (port 53) ──────────────────────────────────────────────────
  dns-server:
    build:
      context: ./dns-server
      dockerfile: Dockerfile
    container_name: ssrf-dns
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    environment:
      SSRF_DOMAIN:       ${SSRF_DOMAIN}
      VPS_IP:            ${VPS_IP}
      HTTP_SERVER_URL:   http://http-server:8080
      INTERNAL_API_KEY:  ${INTERNAL_API_KEY}
      DNS_PORT:          "53"
    restart: unless-stopped
    networks:
      - ssrf-net
    depends_on:
      - http-server
    logging: &logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── HTTP/HTTPS Server (ports 80, 443, 8080) ───────────────────────────────
  http-server:
    build:
      context: ./http-server
      dockerfile: Dockerfile
    container_name: ssrf-http
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    environment:
      SSRF_DOMAIN:       ${SSRF_DOMAIN}
      VPS_IP:            ${VPS_IP}
      API_KEY:           ${API_KEY}
      INTERNAL_API_KEY:  ${INTERNAL_API_KEY}
      DB_PATH:           /data/ssrf-box.db
      TLS_CERT_PATH:     ${TLS_CERT_PATH:-}
      TLS_KEY_PATH:      ${TLS_KEY_PATH:-}
      DISCORD_WEBHOOK:   ${DISCORD_WEBHOOK:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID:  ${TELEGRAM_CHAT_ID:-}
    volumes:
      - db-data:/data
      - tls-certs:/certs:ro
    restart: unless-stopped
    networks:
      - ssrf-net
    logging: *logging

  # ── SMTP / LDAP / FTP Listener ────────────────────────────────────────────
  smtp-ldap:
    build:
      context: ./smtp-ldap-listener
      dockerfile: Dockerfile
    container_name: ssrf-smtp-ldap
    ports:
      - "21:21"
      - "25:25"
      - "389:389"
      - "587:587"
      - "636:636"
    environment:
      HTTP_SERVER_URL:   http://http-server:8080
      INTERNAL_API_KEY:  ${INTERNAL_API_KEY}
    restart: unless-stopped
    networks:
      - ssrf-net
    depends_on:
      - http-server
    logging: *logging

volumes:
  db-data:
    driver: local
  tls-certs:
    driver: local

networks:
  ssrf-net:
    driver: bridge

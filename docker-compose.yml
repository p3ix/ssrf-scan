version: "3.9"

services:
  # ── DNS Server (port 53) ──────────────────────────────────────────────────
  dns-server:
    build:
      context: ./dns-server
      dockerfile: Dockerfile
    container_name: ssrf-dns
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    environment:
      SSRF_DOMAIN:       ${SSRF_DOMAIN}
      VPS_IP:            ${VPS_IP}
      HTTP_SERVER_URL:   http://http-server:8080
      INTERNAL_API_KEY:  ${INTERNAL_API_KEY}
      DNS_PORT:          "53"
    restart: unless-stopped
    networks:
      - ssrf-net
    depends_on:
      - http-server
    logging: &logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── HTTP/HTTPS Server (ports 80, 443, 8080, 3000, 8443, 8888) ────────────
  http-server:
    build:
      context: ./http-server
      dockerfile: Dockerfile
    container_name: ssrf-http
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
      - "3000:3000"    # extra HTTP SSRF listener
      - "8443:8443"    # extra HTTP SSRF listener (plain HTTP, not TLS)
      - "8888:8888"    # extra HTTP SSRF listener
    environment:
      SSRF_DOMAIN:       ${SSRF_DOMAIN}
      VPS_IP:            ${VPS_IP}
      API_KEY:           ${API_KEY}
      INTERNAL_API_KEY:  ${INTERNAL_API_KEY}
      DB_PATH:           /data/ssrf-box.db
      TLS_CERT_PATH:     ${TLS_CERT_PATH:-}
      TLS_KEY_PATH:      ${TLS_KEY_PATH:-}
      AUTO_TLS_DOMAIN:   ${AUTO_TLS_DOMAIN:-}
      CERT_CACHE_DIR:    /certs
      DISCORD_WEBHOOK:   ${DISCORD_WEBHOOK:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID:  ${TELEGRAM_CHAT_ID:-}
      SLACK_WEBHOOK:     ${SLACK_WEBHOOK:-}
      RATE_LIMIT_RPM:    ${RATE_LIMIT_RPM:-50}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./data:/data
      - tls-certs:/certs:ro
    restart: unless-stopped
    networks:
      - ssrf-net
    logging: *logging

  # ── SMTP / LDAP / FTP / DB Listener ──────────────────────────────────────
  smtp-ldap:
    build:
      context: ./smtp-ldap-listener
      dockerfile: Dockerfile
    container_name: ssrf-smtp-ldap
    ports:
      - "21:21"
      - "25:25"
      - "389:389"
      - "587:587"
      - "636:636"
      - "3306:3306"
      - "5432:5432"
      - "6379:6379"
      - "9200:9200"
      - "11211:11211"
      - "27017:27017"
      - "445:445"     # SMB/NTLM — captura hashes NTLMv2 en entornos Windows
    environment:
      HTTP_SERVER_URL:   http://http-server:8080
      INTERNAL_API_KEY:  ${INTERNAL_API_KEY}
      SSRF_DOMAIN:       ${SSRF_DOMAIN}
    restart: unless-stopped
    networks:
      - ssrf-net
    depends_on:
      http-server:
        condition: service_healthy
    logging: *logging

volumes:
  # tls-certs is a named volume; ./data is a bind-mount for easy backup (rsync/cp ./data/).
  # Existing installs using the old named volume 'db-data': copy with:
  #   docker run --rm -v ssrf-scan_db-data:/from -v $(pwd)/data:/to alpine cp -a /from/. /to/
  tls-certs:
    driver: local

networks:
  ssrf-net:
    driver: bridge
